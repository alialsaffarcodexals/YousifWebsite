<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>المواقع المفضلة</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <header>
        <h1>المواقع المفضلة</h1>
    </header>
    <nav>
        <a href="../index.html">الرئيسية</a>
    </nav>
    <main>
        <h2>أضف موقعك المفضل</h2>
        <form id="favForm">
            <input type="text" id="siteName" placeholder="اسم الموقع" required>
            <input type="url" id="siteUrl" placeholder="الرابط" required>
            <button type="submit">إضافة</button>
        </form>
        <ul id="favList"></ul>
    </main>
    <footer>
        &copy; 2024 Yousif
    </footer>
    <script>
        const form = document.getElementById('favForm');
        const list = document.getElementById('favList');
        const sites = JSON.parse(localStorage.getItem('sites')) || [];

        function render() {
            list.innerHTML = '';
            sites.forEach((s, i) => {
                const li = document.createElement('li');
                const a = document.createElement('a');
                a.textContent = s.name;
                a.href = s.url;
                a.target = '_blank';
                li.appendChild(a);
                list.appendChild(li);
            });
        }

        form.addEventListener('submit', e => {
            e.preventDefault();
            const name = document.getElementById('siteName').value;
            const url = document.getElementById('siteUrl').value;
            sites.push({ name, url });
            localStorage.setItem('sites', JSON.stringify(sites));
            render();
            form.reset();
        });

        render();
    </script>
</body>
</html>
