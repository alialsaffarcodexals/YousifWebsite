<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>يوميات يوسف</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <header>
        <h1>يوميات يوسف</h1>
    </header>
    <nav>
        <a href="../index.html">الرئيسية</a>
    </nav>
    <main>
        <h2>أضف فيديو يومي</h2>
        <form id="diaryForm">
            <input type="text" id="videoName" placeholder="اسم المقطع" required>
            <input type="text" id="videoPath" placeholder="المسار" required>
            <button type="submit">إضافة</button>
        </form>
        <div id="videoList"></div>
    </main>
    <footer>
        &copy; 2024 Yousif
    </footer>
    <script src="../js/auth.js"></script>
    <script>
        const form = document.getElementById('diaryForm');
        const list = document.getElementById('videoList');
        const videos = JSON.parse(localStorage.getItem('diaryVideos')) || [];
        let editIndex = -1;

        function render() {
            list.innerHTML = '';
            videos.forEach((v,i) => {
                const div = document.createElement('div');
                const p = document.createElement('p');
                p.textContent = `${v.name} - ${new Date(v.date).toLocaleString()}`;
                const vid = document.createElement('video');
                vid.src = v.path;
                vid.controls = true;
                vid.width = 560;
                const actions = document.createElement('div');
                actions.className = 'actions';
                const edit = document.createElement('button');
                edit.textContent = 'تعديل';
                edit.onclick = () => {
                    document.getElementById('videoName').value = v.name;
                    document.getElementById('videoPath').value = v.path;
                    editIndex = i;
                    form.querySelector('button').textContent = 'حفظ';
                };
                const del = document.createElement('button');
                del.textContent = 'حذف';
                del.onclick = () => {
                    videos.splice(i,1);
                    localStorage.setItem('diaryVideos', JSON.stringify(videos));
                    render();
                };
                actions.appendChild(edit);
                actions.appendChild(del);
                div.appendChild(p);
                div.appendChild(vid);
                div.appendChild(actions);
                list.appendChild(div);
            });
        }

        form.addEventListener('submit', e => {
            e.preventDefault();
            const v = {
                name: document.getElementById('videoName').value,
                path: document.getElementById('videoPath').value,
                date: new Date().toISOString()
            };
            if(editIndex === -1){
                videos.push(v);
            } else {
                videos[editIndex] = v;
                editIndex = -1;
                form.querySelector('button').textContent = 'إضافة';
            }
            localStorage.setItem('diaryVideos', JSON.stringify(videos));
            render();
            form.reset();
        });

        render();
    </script>
</body>
</html>
